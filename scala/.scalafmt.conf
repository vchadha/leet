version = "3.10.7"
runner.dialect = scala3

maxColumn = 100

indent.main = 2
indent.significant = 2

align.preset = more
align.tokens."+" = [
  { code = "->", owner = "Term.ApplyInfix" },
  { code = "<-", owner = "Enumerator.Generator" }
]

newlines.topLevelStatementBlankLines = [
  { blanks = 1 }
]

rewrite.rules = [
  RedundantBraces,
  RedundantParens,
  SortImports
]

docstrings.style = SpaceAsterisk
docstrings.wrap = yes
